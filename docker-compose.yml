services:
  addtoview:
    # 默认从 Docker Hub 拉镜像；本地开发想用源码 build 跑 `docker compose up -d --build`
    image: yallaintsavage/addtoview:latest
    build: .
    container_name: addtoview
    ports:
      - "2232:2232"   # backend (CLI / `curl :2232/addtoview/`)
      - "2233:2233"   # frontend (browser)
    volumes:
      - addtoview-data:/app/data
    # Linux 上让容器能解析 host.docker.internal（Mac/Win Docker Desktop 自带）；
    # 后端会自动把 LLM 配置里的 localhost / 127.0.0.1 改写成这个域名。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ADDTOVIEW_SERVE_STATIC=1
      - DATA_DIR=/app/data
      - ADDTOVIEW_PORTS=2232,2233
      # LLM config is configured at runtime via the Settings page; .env
      # values below are an optional dev fallback.
      # - LLM_API_KEY=
      # - LLM_MODEL_ID=
      # - LLM_BASE_URL=
    restart: unless-stopped

volumes:
  addtoview-data:
